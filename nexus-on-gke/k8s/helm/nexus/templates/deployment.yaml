apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: 1           # Nexus OSS is single-node only
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  strategy:
    type: Recreate      # PVC is RWO — rolling update would fail
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}

      # Allow enough time for Nexus to shut down cleanly
      terminationGracePeriodSeconds: 120

      securityContext:
        runAsUser: 200        # nexus uid inside the image
        runAsGroup: 200
        fsGroup: 200

      initContainers:
        # Fix ownership of the data volume on first start
        - name: volume-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 200:200 /nexus-data"]
          volumeMounts:
            - name: nexus-data
              mountPath: /nexus-data

      containers:
        - name: nexus
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8081
              name: http
          env:
            {{- toYaml .Values.env | nindent 12 }}
            - name: GCS_BUCKET
              value: {{ .Values.gcs.bucketName | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: nexus-data
              mountPath: /nexus-data
          livenessProbe:
            httpGet:
              path: /service/rest/v1/status
              port: 8081
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /service/rest/v1/status
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 15

      volumes:
        - name: nexus-data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
