# ---------------------------------------------------------------------------
# Default values — override per environment with -f values-<env>.yaml
# ---------------------------------------------------------------------------

image:
  repository: gcr.io/YOUR_PROJECT_ID/nexus3-gcs   # pushed after `docker build`
  tag: "3.68.0"
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer      # exposes Nexus UI externally; use ClusterIP + Ingress for prod
  port: 8081
  targetPort: 8081

persistence:
  enabled: true
  storageClass: "standard-rwo"   # GKE standard ReadWriteOnce StorageClass
  size: 10Gi
  accessMode: ReadWriteOnce

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi

# GCP Workload Identity — the KSA is bound to a GSA that has Storage Object Admin
serviceAccount:
  create: true
  name: nexus-sa
  annotations:
    iam.gke.io/gcp-service-account: "nexus-sa@YOUR_PROJECT_ID.iam.gserviceaccount.com"

gcs:
  bucketName: "YOUR_GCS_BUCKET_NAME"

env:
  # Tune JVM heap to ~2/3 of container memory limit
  - name: INSTALL4J_ADD_VM_PARAMS
    value: "-Xms1g -Xmx2g -XX:ActiveProcessorCount=2"
